<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💗 A Little Something For You</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink0: #fff0f5;
    --pink1: #ffd6e7;
    --pink2: #ffafd4;
    --pink3: #ff80b5;
    --pink4: #e75480;
    --rose:  #ffb7c5;
    --blush: #ffe4ec;
    --white: #ffffff;
    --text-dark: #7a3050;
    --text-mid:  #c0648a;
    --shadow: rgba(231,84,128,0.25);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: 'Nunito', sans-serif;
    background: var(--pink0);
    color: var(--text-dark);
  }

  /* ──────────────────────────── PAGES ──────────────────────────── */
  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .65s ease;
    padding: 40px 20px; /* Padding to ensure space on mobile */
  }
  .page.active { opacity: 1; pointer-events: all; position: relative; }
  .page.fade-out { opacity: 0; pointer-events: none; position: absolute; }

  /* ──────────────────────────── BG CANVAS ──────────────────────── */
  canvas.bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ──────────────────────────── PAGE 1 ────────────────────────── */
  #page1 {
    background: linear-gradient(135deg, #ffe4ec 0%, #ffd6e7 40%, #ffb7c5 100%);
    z-index: 10;
  }

  .p1-content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    width: 100%;
    max-width: 400px;
  }

  /* STICKERS ABOVE TEXT (Page 1) */
  .sticker-row-top {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 35px;
    margin-bottom: 10px;
    z-index: 5;
  }

  .above-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.4rem, 6vw, 1.9rem);
    color: var(--text-mid);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 6px rgba(231,84,128,.2);
    animation: floatY 3s ease-in-out infinite;
  }

  .heart-wrap {
    position: relative;
    cursor: pointer;
    filter: drop-shadow(0 0 22px rgba(231,84,128,.5));
    animation: heartbeat 1.2s ease-in-out infinite;
    transition: filter .2s;
    margin: 15px 0;
  }
  .heart-wrap:hover { filter: drop-shadow(0 0 38px rgba(231,84,128,.8)); }
  .heart-svg { width: clamp(150px, 50vw, 220px); height: auto; max-width: 100%; }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%      { transform: scale(1.13); }
    28%      { transform: scale(1); }
    42%      { transform: scale(1.08); }
    56%      { transform: scale(1); }
  }

  .below-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 5vw, 1.6rem);
    color: var(--text-mid);
    animation: floatY 3s ease-in-out infinite .5s;
  }

  .sticker-inline {
    font-size: clamp(55px, 15vw, 85px);
    line-height: 1;
    user-select: none;
    display: inline-block;
  }
  #teddy  { animation: waveTeddy 2s ease-in-out infinite, floatY 4s ease-in-out infinite; }
  #bunny  { animation: floatY 3.5s ease-in-out infinite .3s; }

  .butterfly-sticker {
    position: absolute;
    pointer-events: none;
    z-index: 4;
    font-size: clamp(40px, 10vw, 65px);
    top: 5%;
    left: -80px;
    animation: flyButterfly 12s linear infinite;
  }

  @keyframes waveTeddy {
    0%,100% { transform: rotate(-8deg); }
    50%      { transform: rotate(8deg); }
  }
  @keyframes floatY {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  @keyframes flyButterfly {
    0%   { transform: translateX(-80px) translateY(0)   rotate(-10deg); opacity:0; }
    5%   { opacity:1; }
    50%  { transform: translateX(50vw)   translateY(30px) rotate(8deg); }
    95%  { opacity:1; }
    100% { transform: translateX(110vw) translateY(-20px) rotate(-5deg); opacity:0; }
  }

  /* HEART SPLIT */
  .heart-half {
    position: fixed;
    font-size: clamp(80px, 15vw, 110px);
    z-index: 100;
    pointer-events: none;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    opacity: 0;
  }
  .heart-half.left  { animation: splitLeft  .8s forwards .1s; }
  .heart-half.right { animation: splitRight .8s forwards .1s; }
  @keyframes splitLeft  { to { transform: translate(-150%,-80%) rotate(-25deg); opacity:0; } }
  @keyframes splitRight { to { transform: translate( 60%, -80%) rotate( 25deg); opacity:0; } }

  /* ──────────────────────────── PAGE 2 ────────────────────────── */
  #page2 {
    background: linear-gradient(160deg, #fff0f5 0%, #ffe4ec 60%, #ffd6e7 100%);
    z-index: 9;

  /* ──────────────────────────── CONFETTI ─────────────────────── */
  .confetti-piece {

<script>
/* ═══════════════════════════════════════════════════
   CANVAS PARTICLES
═══════════════════════════════════════════════════ */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const PARTICLES = [];
const EMOJIS = ['💗','✨','🌸','💕','⭐','💖'];

function mkParticle() {
  return {
    x: Math.random() * window.innerWidth,
    y: window.innerHeight + 20,
    emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
    size: 14 + Math.random() * 20,
    speedY: -(0.4 + Math.random() * 0.7),
    speedX: (Math.random() - .5) * 0.5,
    opacity: 0,
    maxOp: 0.5 + Math.random() * 0.4,
    life: 0,
    maxLife: 220 + Math.random() * 180,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - .5) * 0.02
  };
}

for (let i = 0; i < 22; i++) {
  const p = mkParticle();
  p.y = Math.random() * window.innerHeight;
  p.life = Math.random() * p.maxLife;
  PARTICLES.push(p);
}

function animParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < PARTICLES.length; i++) {
    const p = PARTICLES[i];
    p.life++;
    p.x += p.speedX;
    p.y += p.speedY;
    p.rot += p.rotSpeed;
    if (p.life < 30) p.opacity = (p.life / 30) * p.maxOp;
    else if (p.life > p.maxLife - 40) p.opacity = ((p.maxLife - p.life) / 40) * p.maxOp;
    else p.opacity = p.maxOp;
    if (p.life >= p.maxLife || p.y < -40) {
      PARTICLES[i] = mkParticle();
      continue;
    }
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
  }
  requestAnimationFrame(animParticles);
}
animParticles();

/* ═══════════════════════════════════════════════════
   AUDIO (Web Audio API)
═══════════════════════════════════════════════════ */
let audioCtx = null;
let heartbeatInterval = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playHeartbeatTick() {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.value = 60;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(0.08, ac.currentTime + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.2);
  } catch(e){}
}

function startHeartbeat() {
  if (heartbeatInterval) return;
  heartbeatInterval = setInterval(() => {
    playHeartbeatTick();
    setTimeout(playHeartbeatTick, 280);
  }, 1100);
}

function stopHeartbeat() {
  clearInterval(heartbeatInterval);
  heartbeatInterval = null;
}

function playChime() {
  try {
    const ac = getAudioCtx();
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.09;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t); osc.stop(t + 0.6);
    });
  } catch(e){}
}

function playConfettiSound() {
  try {
    const ac = getAudioCtx();
    [880, 1046, 1318, 1568].forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = ac.currentTime + i * 0.07;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.5);
    });
  } catch(e){}
}

/* ═══════════════════════════════════════════════════
   TRANSITION HELPER
═══════════════════════════════════════════════════ */
function goToPage(fromId, toId, delay = 900) {
  const from = document.getElementById(fromId);
  const to   = document.getElementById(toId);
  from.classList.add('fade-out');
  setTimeout(() => {
    from.classList.remove('active','fade-out');
    to.classList.add('active');
  }, delay);
}

/* ═══════════════════════════════════════════════════
   PAGE 1 – HEART CLICK
═══════════════════════════════════════════════════ */
const heartBtn = document.getElementById('heartBtn');
let heartClicked = false;

document.addEventListener('click', () => { startHeartbeat(); }, { once: true });
document.addEventListener('touchstart', () => { startHeartbeat(); }, { once: true });

heartBtn.addEventListener('click', () => {
  if (heartClicked) return;
  heartClicked = true;
  stopHeartbeat();
  playChime();

  heartBtn.style.filter = 'drop-shadow(0 0 60px rgba(231,84,128,.95))';
  heartBtn.style.transition = 'filter .25s';

  spawnSparkBurst(window.innerWidth/2, window.innerHeight/2, 30);

  setTimeout(() => {
    const lh = document.createElement('div');
    const rh = document.createElement('div');
    lh.className = 'heart-half left';
    rh.className = 'heart-half right';
    lh.textContent = '💗'; rh.textContent = '💗';
    document.body.appendChild(lh); document.body.appendChild(rh);
    setTimeout(() => { lh.remove(); rh.remove(); }, 900);
  }, 250);

  setTimeout(() => { goToPage('page1', 'page2', 600); startTypewriter(); }, 500);
});

function spawnSparkBurst(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'spark-burst';
    const angle = (Math.PI * 2 * i) / count;
    const dist = 60 + Math.random() * 80;
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    el.style.setProperty('--sd', (.4 + Math.random() * .5) + 's');
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

/* ═══════════════════════════════════════════════════
   PAGE 2 – TYPEWRITER
═══════════════════════════════════════════════════ */
const apologyText = `🫀🧚‍♀️

Adiyyaaeee Abiiii !!! 💗✨

Sorrrryyyyyy ngaaaaaaa
from the bottom of my hearttt !! 🌝❤️

🥺💔

I know I messed up...
and this tiny pink heart has been
carrying so much regret. 🥹💗

🙂❤️‍🩹

Please accept this little apology,
wrapped with love 🌹❤️`;

let twTimeout = null;

function startTypewriter() {
  const el = document.getElementById('typewriter');
  el.textContent = '';
  let i = 0;

  function type() {
    if (i < apologyText.length) {
      el.textContent += apologyText[i];
      i++;
      const delay = apologyText[i-1] === '\n' ? 120 : 40;
      twTimeout = setTimeout(type, delay);
    } else {
      setTimeout(() => {
        const btn = document.getElementById('continue-btn');
        btn.classList.add('show');
      }, 600);
    }
  }
  type();
}

document.getElementById('continue-btn').addEventListener('click', () => {
  goToPage('page2', 'page3', 700);
  setTimeout(initNoBtn, 800); 
});

/* ═══════════════════════════════════════════════════
   PAGE 3 – ESCAPE BUTTON
═══════════════════════════════════════════════════ */
function initNoBtn() {
  const noBtn = document.getElementById('no-btn');
  const yesBtn = document.getElementById('yes-btn');
  const page3 = document.getElementById('page3');
  
  // 1. Page 3 load aahum pothu mattum button-ah show pannu
  noBtn.classList.add('show');
  
  // 2. Initial inline position-ah reset panni neat-ah inline vainga
  noBtn.style.left = "";
  noBtn.style.top = "";

  // 3. Desktop/Mobile layout bounds check panni, "Yes" button pakkathulaye align pannum
  const yesRect = yesBtn.getBoundingClientRect();
  const pageRect = page3.getBoundingClientRect();
  
  let initialLeft = yesRect.left - pageRect.left - 130;
  let initialTop = yesRect.top - pageRect.top;
  
  // Chinna mobile screens-la left overlap aahama iruka safety adjustment
  if (initialLeft < 10) {
    initialLeft = yesRect.left - pageRect.left + yesRect.width + 15;
  }
  
  noBtn.style.left = initialLeft + 'px';
  noBtn.style.top = initialTop + 'px';

  // 4. Intha function thaan CLiCK (press) panna udane odi poga vaikkum
  function flee(e) {
    if (e) e.preventDefault();
    const bw = noBtn.offsetWidth;
    const bh = noBtn.offsetHeight;
    let nx, ny;
    
    for (let attempt = 0; attempt < 40; attempt++) {
      nx = Math.random() * (window.innerWidth - bw - 30) + 15;
      ny = Math.random() * (window.innerHeight - bh - 30) + 15;
      
      const cx = (e.clientX || e.touches?.[0]?.clientX || window.innerWidth / 2);
      const cy = (e.clientY || e.touches?.[0]?.clientY || window.innerHeight / 2);
      
      if (Math.hypot(nx - cx, ny - cy) > 100) break;
    }
    
    noBtn.style.transition = 'left .25s cubic-bezier(.25,1.6,.5,1), top .25s cubic-bezier(.25,1.6,.5,1)';
    noBtn.style.left = nx + 'px';
    noBtn.style.top = ny + 'px';
  }

  // Pure click event restriction (No mouseover, no touchstart)
  noBtn.removeEventListener('click', flee);
  noBtn.addEventListener('click', flee);
}
/* ═══════════════════════════════════════════════════
   PAGE 3 – YES BUTTON
═══════════════════════════════════════════════════ */
document.getElementById('yes-btn').addEventListener('click', () => {
  const noBtn = document.getElementById('no-btn');
  if(noBtn) noBtn.remove(); 
  playConfettiSound();
  launchConfetti();
  spawnSparkBurst(window.innerWidth/2, window.innerHeight/2, 40);
  setTimeout(() => {
    goToPage('page3', 'page4', 700);
    startFinalTypewriter();
  }, 800);
});

function launchConfetti() {
  const colors = ['#ff80b5','#e75480','#ffb7c5','#ffd6e7','#ff4499','#ffafd4','#fff0f5'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.top  = '0';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      c.style.width  = (7 + Math.random()*9) + 'px';
      c.style.height = (7 + Math.random()*9) + 'px';
      c.style.setProperty('--dur', (1.2 + Math.random() * 1.8) + 's');
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3200);

      if (Math.random() > .6) {
        const h = document.createElement('div');
        h.style.cssText = `position:fixed;font-size:${16+Math.random()*20}px;
          left:${Math.random()*100}vw;top:0;z-index:200;pointer-events:none;
          animation:confettiFall ${1.5+Math.random()*1.5}s ease-in forwards`;
        h.textContent = ['💗','💖','💕','✨','🌸'][Math.floor(Math.random()*5)];
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 3500);
      }
    }, i * 30);
  }
}
